<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Chilli Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0C0A09;
      color: #FAFAF9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    :root {
      --crimson: #be123c;
      --crimson-300: #fda4af;
      --stone-900: #1C1917;
      --stone-500: #78716C;
      --stone-300: #D6D3D1;
    }

    .bg-orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    }
    .orb1 { width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(190,18,60,.15) 0%,transparent 65%); }
    .orb2 { width:500px;height:500px;bottom:-150px;right:-150px;background:radial-gradient(circle,rgba(234,88,12,.08) 0%,transparent 65%); }

    .wrapper { width:100%;max-width:440px;position:relative;z-index:1; }

    .top { text-align:center;margin-bottom:32px; }
    .logo-link {
      display:inline-flex;align-items:center;gap:10px;margin-bottom:28px;
      font-family:'DM Serif Display',serif;font-size:18px;color:rgba(255,255,255,.7);
    }
    .logo-icon {
      width:32px;height:32px;background:white;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
    }
    .passport-icon {
      width:64px;height:64px;background:rgba(190,18,60,.15);
      border:1px solid rgba(190,18,60,.3);border-radius:18px;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 18px;font-size:28px;
    }
    h1 { font-family:'DM Serif Display',serif;font-size:32px;color:white;line-height:1.15;margin-bottom:8px; }
    h1 em { font-style:italic;color:var(--crimson-300); }
    .top p { font-size:15px;color:rgba(255,255,255,.4);line-height:1.6; }

    .card {
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      border-radius:24px;padding:32px;backdrop-filter:blur(16px);
    }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:14px; }
    .form-group { margin-bottom:16px; }
    .form-group label {
      display:block;font-size:11px;font-weight:600;letter-spacing:.07em;
      text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:7px;
    }
    .form-group input {
      width:100%;padding:13px 16px;
      background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);
      border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;
      color:white;outline:none;transition:border-color .15s,background .15s;
    }
    .form-group input::placeholder { color:rgba(255,255,255,.22); }
    .form-group input:focus { border-color:rgba(190,18,60,.6);background:rgba(255,255,255,.08); }
    .form-group input.error { border-color:rgba(220,38,38,.6); }
    .field-error { font-size:12px;color:#FCA5A5;margin-top:5px;display:none; }
    .field-error.show { display:block; }

    .password-wrap { position:relative; }
    .password-wrap input { padding-right:44px; }
    .toggle-pw {
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);
      padding:4px;transition:color .15s;
    }
    .toggle-pw:hover { color:rgba(255,255,255,.7); }
    .toggle-pw svg { width:18px;height:18px; }

    .strength-bar { height:3px;border-radius:99px;background:rgba(255,255,255,.08);margin-top:8px;overflow:hidden; }
    .strength-fill { height:100%;border-radius:99px;width:0%;transition:width .3s,background .3s; }

    .terms {
      display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;
      font-size:13px;color:rgba(255,255,255,.4);line-height:1.5;
    }
    .terms input[type="checkbox"] { margin-top:2px;flex-shrink:0;accent-color:var(--crimson);width:15px;height:15px; }
    .terms a { color:rgba(190,18,60,.8);text-decoration:underline; }

    .submit-btn {
      width:100%;padding:15px;background:var(--crimson);color:white;border:none;
      border-radius:99px;cursor:pointer;font-family:'DM Serif Display',serif;
      font-size:18px;font-style:italic;font-weight:400;
      transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .submit-btn:hover:not(:disabled) { background:#9f1239;transform:translateY(-1px);box-shadow:0 8px 24px rgba(190,18,60,.3); }
    .submit-btn:disabled { opacity:.6;cursor:not-allowed;transform:none; }

    .alert {
      padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:16px;
      display:none;
    }
    .alert.show { display:block; }
    .alert-error { background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#FCA5A5; }
    .alert-success { background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.3);color:#34D399; }

    .divider { text-align:center;font-size:13px;color:rgba(255,255,255,.2);margin:18px 0; }
    .signin-link {
      text-align:center;font-size:14px;color:rgba(255,255,255,.35);margin-top:16px;
    }
    .signin-link a { color:rgba(190,18,60,.9);font-weight:500; }
    .signin-link a:hover { color:var(--crimson-300); }

    @media (max-width:480px) { .form-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="bg-orb orb1" aria-hidden="true"></div>
  <div class="bg-orb orb2" aria-hidden="true"></div>

  <div class="wrapper">
    <div class="top">
      <a href="index.html" class="logo-link" aria-label="Back to Chilli Club home">
        <div class="logo-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="#1C1917" stroke-width="1.5"/>
            <path d="M2 9h14M9 2a12 12 0 010 14M9 2a12 12 0 000 14" stroke="#1C1917" stroke-width="1.5"/>
          </svg>
        </div>
        Chilli Club
      </a>
      <div class="passport-icon" aria-hidden="true">🌏</div>
      <h1>Begin your<br><em>journey.</em></h1>
      <p>Create your account and start collecting stamps<br>from around the world.</p>
    </div>

    <div class="card">
      <div id="alert-box" class="alert" role="alert" aria-live="polite"></div>

      <form id="signup-form" novalidate aria-label="Create account form">
        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First name</label>
            <input type="text" id="first-name" placeholder="Clara" autocomplete="given-name" required />
            <div class="field-error" id="err-first">Required</div>
          </div>
          <div class="form-group">
            <label for="last-name">Last name</label>
            <input type="text" id="last-name" placeholder="M." autocomplete="family-name" required />
            <div class="field-error" id="err-last">Required</div>
          </div>
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="urban_explorer" autocomplete="username" required minlength="3" maxlength="20" />
          <div class="field-error" id="err-username">3–20 characters, letters/numbers/underscores only</div>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="clara@example.com" autocomplete="email" required />
          <div class="field-error" id="err-email">Enter a valid email address</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8" />
            <button type="button" class="toggle-pw" onclick="togglePw('password', this)" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="strength-bar" aria-hidden="true"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="field-error" id="err-password">Minimum 8 characters</div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <div class="password-wrap">
            <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('confirm-password', this)" aria-label="Toggle confirm password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-error" id="err-confirm">Passwords don't match</div>
        </div>

        <div class="terms">
          <input type="checkbox" id="terms-check" required />
          <label for="terms-check">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I'm ready to explore.</label>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          Create My Passport
        </button>
      </form>

      <p class="signin-link">Already an explorer? <a href="passport.html">Sign in →</a></p>
    </div>
  </div>

  <script>
    const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    // Redirect if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'passport.html';
    });

    // Password strength
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const fill = document.getElementById('strength-fill');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#DC2626','#F97316','#EAB308','#22C55E'];
      const widths = ['25%','50%','75%','100%'];
      fill.style.width = val ? widths[score-1] || '10%' : '0%';
      fill.style.background = val ? colors[score-1] || '#DC2626' : '';
    });

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.innerHTML = showing
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    }

    function showAlert(msg, type='error') {
      const box = document.getElementById('alert-box');
      box.textContent = msg;
      box.className = `alert alert-${type} show`;
      box.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }

    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show'));
      document.querySelectorAll('input').forEach(e => e.classList.remove('error'));
      const box = document.getElementById('alert-box');
      box.className = 'alert';
    }

    function fieldError(id, errId) {
      document.getElementById(id).classList.add('error');
      document.getElementById(errId).classList.add('show');
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const firstName = document.getElementById('first-name').value.trim();
      const lastName  = document.getElementById('last-name').value.trim();
      const username  = document.getElementById('username').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const confirm   = document.getElementById('confirm-password').value;
      const terms     = document.getElementById('terms-check').checked;

      let valid = true;
      if (!firstName) { fieldError('first-name','err-first'); valid=false; }
      if (!lastName)  { fieldError('last-name','err-last'); valid=false; }
      if (!username || !/^[a-zA-Z0-9_]{3,20}$/.test(username)) { fieldError('username','err-username'); valid=false; }
      if (!email || !/\S+@\S+\.\S+/.test(email)) { fieldError('email','err-email'); valid=false; }
      if (!password || password.length < 8) { fieldError('password','err-password'); valid=false; }
      if (password !== confirm) { fieldError('confirm-password','err-confirm'); valid=false; }
      if (!terms) { showAlert('Please accept the terms to continue.'); valid=false; }
      if (!valid) return;

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = 'Creating your passport…';

      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: {
            username,
            full_name: `${firstName} ${lastName}`,
            first_name: firstName,
          }
        }
      });

      if (error) {
        showAlert(error.message);
        btn.disabled = false;
        btn.innerHTML = 'Create My Passport';
        return;
      }

      // Success — check if email confirmation needed
      if (data.user && !data.session) {
        showAlert('✓ Account created! Check your email to confirm, then sign in.', 'success');
        btn.innerHTML = 'Check your email →';
        setTimeout(() => window.location.href = 'passport.html', 3000);
      } else {
        window.location.href = 'passport.html';
      }
    });
  </script>
</body>
</html>
